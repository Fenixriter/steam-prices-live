name: Automated Steam Price Update

on:
  schedule:
    - cron: '0 * * * *' # Запуск робота автоматически каждый час
  workflow_dispatch: # Позволяет запускать обновление вручную кнопкой

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch fresh prices from Steam Central Index
      run: |
        # Скачиваем свежий кэш цен в рублях, к которому у Стима нет претензий
        curl -s "https://jsdelivr.net" > raw_base.json
        
        # Пересобираем тяжелую базу в легкий плоский файл чисто под ваш список предметов
        node -e '
          const fs = require("fs");
          const raw = JSON.parse(fs.readFileSync("raw_base.json", "utf8"));
          const prices = raw["730"] || {};
          const result = {};
          for (let key in prices) {
            result[key.toLowerCase().trim()] = prices[key].lowest_price || prices[key].median_price || prices[key].suggested_price || 0;
          }
          fs.writeFileSync("prices.json", JSON.stringify(result, null, 2));
        '
        rm raw_base.json

    - name: Commit and push changes back to landing
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add prices.json
        git diff-index --quiet HEAD || git commit -m "Automated hourly market price sync"
        git push
