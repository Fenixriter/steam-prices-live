name: Automated Steam Price Update

on:
  schedule:
    - cron: '0 * * * *' # Автоматический запуск каждый час
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch Live Prices Directly From Steam
      run: |
        # Используем официальный поисковый движок Steam, который для серверов GitHub всегда открыт
        curl -s "https://steamcommunity.com" > steam_raw.json
        
        # Пересобираем данные в плоский JSON-файл цен
        node -e '
          const fs = require("fs");
          try {
            const raw = JSON.parse(fs.readFileSync("steam_raw.json", "utf8"));
            if (!raw || !raw.results) throw new Error("Empty Steam response");
            
            const result = {};
            raw.results.forEach(item => {
              if (item.hash_name && item.sell_min_price) {
                result[item.hash_name.toLowerCase().trim()] = item.sell_min_price / 100;
              }
            });
            
            // Если Steam отдал данные, перезаписываем файл цен
            if (Object.keys(result).length > 0) {
              fs.writeFileSync("prices.json", JSON.stringify(result, null, 2));
              console.log("Prices successfully updated directly from Valve servers!");
            } else {
              console.log("No prices found in response, keeping old cache.");
            }
          } catch(e) {
            console.error("Failed to parse Steam response:", e.message);
          }
        '
        rm steam_raw.json

    - name: Commit and push changes back to landing
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add prices.json
        git diff-index --quiet HEAD || git commit -m "Automated live market price sync from Steam"
        git push
