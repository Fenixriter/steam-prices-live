name: Automated Steam Price Update

on:
  schedule:
    - cron: '0 * * * *' # Автоматический запуск каждый час
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Sync Prices From Global CS2 Database
      run: |
        node -e '
          const fs = require("fs");
          
          const itemsToFind = [
            "Budapest 2025 Train Souvenir Package",
            "Budapest 2025 Overpass Souvenir Highlight Package",
            "Budapest 2025 Inferno Souvenir Package",
            "Budapest 2025 Nuke Souvenir Highlight Package",
            "Budapest 2025 Nuke Souvenir Package",
            "Dreams & Nightmares Case",
            "AK-47 | Crossfade (Factory New)",
            "Desert Eagle | Printstream (Factory New)",
            "Desert Eagle | Conspiracy (Factory New)",
            "Glock-18 | Vogue (Factory New)",
            "USP-S | Printstream (Factory New)",
            "Horizon Case",
            "Warhammer 40,000 Sticker Capsule",
            "Warhammer 40,000 Traitor Astartes Sticker Capsule",
            "Operation Breakout Weapon Case",
            "Kilowatt Case",
            "MP7 | Abyssal Apparition (Factory New)",
            "Austin 2025 Legends Sticker Capsule",
            "Paris 2023 Inferno Souvenir Package",
            "Paris 2023 Anubis Souvenir Package",
            "Fracture Case",
            "Recoil Case"
          ];
          
          async function fetchFromMirror() {
            // Скачиваем готовую, ежечасно обновляемую базу цен Steam в RUB с белого CDN-зеркала
            const url = "https://githubusercontent.com";
            
            try {
              const res = await fetch(url, { headers: { "User-Agent": "Mozilla/5.0" } });
              
              if (res.status === 200) {
                const json = await res.json();
                const steamPrices = json["730"] || {};
                const result = {};
                
                // Фильтруем базу и вытаскиваем цены строго для вашего списка
                itemsToFind.forEach(name => {
                  const targetData = steamPrices[name];
                  if (targetData) {
                    // Берем самую актуальную минимальную или медианную цену на ТП
                    const price = targetData.lowest_price || targetData.median_price || targetData.suggested_price || 0;
                    result[name.toLowerCase().trim()] = price;
                    console.log("[БАЗА УСПЕХ] " + name + ": " + price + " РУБ.");
                  }
                });
                
                // Если MP7 записан в таблице без качества, делаем дубликат для совместимости
                result["mp7 | abyssal apparition"] = result["mp7 | abyssal apparition (factory new)"] || 85.00;
                
                result["last_updated_time_mark"] = new Date().toISOString();
                fs.writeFileSync("prices.json", JSON.stringify(result, null, 2));
                console.log("Синхронизация через CDN зеркало завершена успешно!");
                
              } else {
                console.log("[ОШИБКА ЗЕРКАЛА] Код: " + res.status);
              }
            } catch(e) {
              console.log("[СБОЙ CDN] " + e.message);
            }
          }
          
          fetchFromMirror();
        '

    - name: Commit and push changes back to landing
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add prices.json
        git diff-index --quiet HEAD || git commit -m "Automated market price sync via CDN mirror"
        git push
