name: Automated Steam Price Update

on:
  schedule:
    - cron: '0 * * * *' # Автоматический запуск каждый час
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch Live Prices Directly From Steam
      run: |
        node -e '
          const fs = require("fs");
          
          const itemsToFind = [
            "Budapest 2025 Train Souvenir Package",
            "Budapest 2025 Overpass Souvenir Highlight Package",
            "Budapest 2025 Inferno Souvenir Package",
            "Budapest 2025 Nuke Souvenir Highlight Package",
            "Budapest 2025 Nuke Souvenir Package",
            "Dreams & Nightmares Case",
            "AK-47 | Crossfade (Factory New)",
            "Desert Eagle | Printstream (Factory New)",
            "Desert Eagle | Conspiracy (Factory New)",
            "Glock-18 | Vogue (Factory New)",
            "USP-S | Printstream (Factory New)",
            "Horizon Case",
            "Warhammer 40,000 Sticker Capsule",
            "Warhammer 40,000 Traitor Astartes Sticker Capsule",
            "Operation Breakout Weapon Case",
            "Kilowatt Case",
            "MP7 | Abyssal Apparition (Factory New)",
            "Austin 2025 Legends Sticker Capsule",
            "Paris 2023 Inferno Souvenir Package",
            "Paris 2023 Anubis Souvenir Package",
            "Fracture Case",
            "Recoil Case"
          ];
          
          let result = {};
          if (fs.existsSync("prices.json")) {
            try { result = JSON.parse(fs.readFileSync("prices.json", "utf8")); } catch(e) {}
          }
          
          async function fetchBulk() {
            // ДЕЛАЕМ ВСЕГО 1 ЗАПРОС к рендереру ТП, запрашивая первые 100 популярных предметов
            const url = "https://steamcommunity.com";
            
            try {
              const res = await fetch(url, {
                headers: { "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" }
              });
              
              if (res.status === 200) {
                const json = await res.json();
                if (json && json.results) {
                  
                  // Перебираем всё, что отдал Стим, и сверяем с нашим списком
                  json.results.forEach(marketItem => {
                    const hashName = marketItem.hash_name;
                    
                    itemsToFind.forEach(myName => {
                      // Проверяем совпадение (без учета регистра)
                      if (hashName.toLowerCase().trim() === myName.toLowerCase().trim()) {
                        if (marketItem.sell_min_price) {
                          const priceRUB = marketItem.sell_min_price / 100;
                          result[myName.toLowerCase().trim()] = priceRUB;
                          console.log("[ПАКЕТНЫЙ УСПЕХ] " + myName + ": " + priceRUB + " РУБ.");
                        }
                      }
                    });
                  });
                }
              } else {
                console.log("[ОШИБКА СЕРВЕРА] Код: " + res.status);
              }
            } catch(e) {
              console.log("[СБОЙ СЕТИ] " + e.message);
            }
            
            // Сохраняем результат
            result["last_updated_time_mark"] = new Date().toISOString();
            fs.writeFileSync("prices.json", JSON.stringify(result, null, 2));
            console.log("Пакетная синхронизация завершена успешно!");
          }
          
          fetchBulk();
        '

    - name: Commit and push changes back to landing
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add prices.json
        git diff-index --quiet HEAD || git commit -m "Automated live market price sync via bulk API"
        git push
