name: Automated Steam Price Update

on:
  schedule:
    - cron: '0 * * * *' # Автоматический запуск каждый час
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Sync Live Prices From Unpkg CDN
      run: |
        node -e '
          const fs = require("fs");
          
          const itemsToFind = [
            "Budapest 2025 Train Souvenir Package",
            "Budapest 2025 Overpass Souvenir Highlight Package",
            "Budapest 2025 Inferno Souvenir Package",
            "Budapest 2025 Nuke Souvenir Highlight Package",
            "Budapest 2025 Nuke Souvenir Package",
            "Dreams & Nightmares Case",
            "AK-47 | Crossfade (Factory New)",
            "Desert Eagle | Printstream (Factory New)",
            "Desert Eagle | Conspiracy (Factory New)",
            "Glock-18 | Vogue (Factory New)",
            "USP-S | Printstream (Factory New)",
            "Horizon Case",
            "Warhammer 40,000 Sticker Capsule",
            "Warhammer 40,000 Traitor Astartes Sticker Capsule",
            "Operation Breakout Weapon Case",
            "Kilowatt Case",
            "MP7 | Abyssal Apparition (Factory New)",
            "Austin 2025 Legends Sticker Capsule",
            "Paris 2023 Inferno Souvenir Package",
            "Paris 2023 Anubis Souvenir Package",
            "Fracture Case",
            "Recoil Case"
          ];
          
          async function fetchLivePrices() {
            // Подключаем официальное CDN-зеркало UNPKG, которое всегда отдает чистый JSON
            const url = "https://unpkg.com";
            const result = {};
            
            try {
              const res = await fetch(url, { headers: { "User-Agent": "Mozilla/5.0" } });
              
              if (res.status === 200) {
                const json = await res.json();
                
                itemsToFind.forEach(name => {
                  // В этой базе цены лежат в плоском списке по именам предметов
                  const price = json[name];
                  if (price) {
                    result[name.toLowerCase().trim()] = parseFloat(price);
                  }
                });
                
                // Совместимость имени MP7 для вашей таблицы
                result["mp7 | abyssal apparition"] = result["mp7 | abyssal apparition (factory new)"];
                
                result["last_updated_time_mark"] = new Date().toISOString();
                fs.writeFileSync("prices.json", JSON.stringify(result, null, 2));
                console.log("[ЖИВОЙ УСПЕХ] База цен успешно обновлена через UNPKG CDN!");
              } else {
                throw new Error("Server response code: " + res.status);
              }
            } catch(e) {
              console.log("[ОШИБКА ОБНОВЛЕНИЯ] " + e.message);
            }
          }
          
          fetchLivePrices();
        '

    - name: Commit and push changes back to landing
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add prices.json
        git diff-index --quiet HEAD || git commit -m "Automated hourly live price sync via UNPKG"
        git push
