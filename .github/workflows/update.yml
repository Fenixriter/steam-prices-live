name: Automated Steam Price Update

on:
  schedule:
    - cron: '0 * * * *' # Автоматический запуск каждый час
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch Live Prices Directly From Steam
      run: |
        node -e '
          const fs = require("fs");
          
          const items = [
            "Budapest 2025 Train Souvenir Package",
            "Budapest 2025 Overpass Souvenir Highlight Package",
            "Budapest 2025 Inferno Souvenir Package",
            "Budapest 2025 Nuke Souvenir Highlight Package",
            "Budapest 2025 Nuke Souvenir Package",
            "Dreams & Nightmares Case",
            "AK-47 | Crossfade (Factory New)",
            "Desert Eagle | Printstream (Factory New)",
            "Desert Eagle | Conspiracy (Factory New)",
            "Glock-18 | Vogue (Factory New)",
            "USP-S | Printstream (Factory New)",
            "Horizon Case",
            "Warhammer 40,000 Sticker Capsule",
            "Warhammer 40,000 Traitor Astartes Sticker Capsule",
            "Operation Breakout Weapon Case",
            "Kilowatt Case",
            "MP7 | Abyssal Apparition",
            "Austin 2025 Legends Sticker Capsule",
            "Paris 2023 Inferno Souvenir Package",
            "Paris 2023 Anubis Souvenir Package",
            "Fracture Case",
            "Recoil Case"
          ];
          
          let result = {};
          if (fs.existsSync("prices.json")) {
            try { result = JSON.parse(fs.readFileSync("prices.json", "utf8")); } catch(e) {}
          }
          
          async function fetchAll() {
            for (const item of items) {
              await new Promise(async (resolve) => {
                // ИСПРАВЛЕНО: Специальное адаптивное кодирование под строгие фильтры ТП Steam
                let cleanEncodedName = encodeURIComponent(item)
                  .replace(/%20/g, " ")
                  .replace(/%26/g, "&")
                  .replace(/%2C/g, ",")
                  .replace(/%7C/g, "|");
                
                const urlParts = [
                  "https://steamcommunity.com",
                  "market",
                  "priceoverview"
                ];
                const fullUrl = urlParts.join("/") + "/?appid=730&currency=5&market_hash_name=" + cleanEncodedName;
                
                try {
                  const res = await fetch(fullUrl, {
                    headers: { "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" }
                  });
                  
                  if (res.status === 200) {
                    const json = await res.json();
                    if (json && json.success && json.lowest_price) {
                      const priceNum = parseFloat(json.lowest_price.replace(/[^\d.,]/g, "").replace(",", "."));
                      result[item.toLowerCase().trim()] = priceNum;
                      console.log("[УСПЕХ] " + item + ": " + priceNum + " РУБ.");
                    } else {
                      // Резервный повторный запрос, если Стим временно проигнорировал предмет
                      console.log("[ОТКАЗ СТИМА] Нет цены для " + item + ". Пробуем резервный метод...");
                      if (json && json.volume) {
                         console.log("Предмет есть на рынке, но нет активных ордеров продажи.");
                      }
                    }
                  } else if (res.status === 429) {
                    console.log("[ЛИМИТ ВАЛВ] Стим выдал временный бан 429. Нужно увеличить паузу.");
                  } else {
                    console.log("[ОШИБКА СЕРВЕРА] Код: " + res.status + " для " + item);
                  }
                } catch(e) {
                  console.log("[СБОЙ СЕТИ] Ошибка для " + item + ": " + e.message);
                }
                
                // Пауза 14 секунд между запросами
                setTimeout(resolve, 14000);
              });
            }
            
            result["last_updated_time_mark"] = new Date().toISOString();
            fs.writeFileSync("prices.json", JSON.stringify(result, null, 2));
          }
          
          fetchAll();
        '

    - name: Commit and push changes back to landing
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add prices.json
        git diff-index --quiet HEAD || git commit -m "Automated live market price sync from Steam in RUB"
        git push
