name: Automated Steam Price Update

on:
  schedule:
    - cron: '0 * * * *' # Автоматический запуск каждый час
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch Live Prices Directly From Steam
      run: |
        node -e '
          const fs = require("fs");
          const https = require("https");
          
          const items = [
            "Budapest 2025 Train Souvenir Package",
            "Budapest 2025 Overpass Souvenir Highlight Package",
            "Budapest 2025 Inferno Souvenir Package",
            "Budapest 2025 Nuke Souvenir Highlight Package",
            "Budapest 2025 Nuke Souvenir Package",
            "Dreams & Nightmares Case",
            "AK-47 | Crossfade (Factory New)",
            "Desert Eagle | Printstream (Factory New)",
            "Desert Eagle | Conspiracy (Factory New)",
            "Glock-18 | Vogue (Factory New)",
            "USP-S | Printstream (Factory New)",
            "Horizon Case",
            "Warhammer 40,000 Sticker Capsule",
            "Warhammer 40,000 Traitor Astartes Sticker Capsule",
            "Operation Breakout Weapon Case",
            "Kilowatt Case",
            "MP7 | Abyssal Apparition",
            "Austin 2025 Legends Sticker Capsule",
            "Paris 2023 Inferno Souvenir Package",
            "Paris 2023 Anubis Souvenir Package",
            "Fracture Case",
            "Recoil Case"
          ];
          
          // Проверяем, существует ли старый файл, или создаем пустой объект
          let result = {};
          if (fs.existsSync("prices.json")) {
            try { result = JSON.parse(fs.readFileSync("prices.json", "utf8")); } catch(e) {}
          }
          
          async function fetchAll() {
            for (const item of items) {
              await new Promise((resolve) => {
                const encoded = encodeURIComponent(item);
                const url = `https://steamcommunity.com{encoded}`;
                
                https.get(url, { headers: { "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" } }, (res) => {
                  let data = "";
                  res.on("data", (chunk) => data += chunk);
                  res.on("end", () => {
                    try {
                      const json = JSON.parse(data);
                      if (json && json.success && json.lowest_price) {
                        const priceNum = parseFloat(json.lowest_price.replace(/[^\d.,]/g, "").replace(",", "."));
                        result[item.toLowerCase().trim()] = priceNum;
                        console.log(`[УСПЕХ] ${item}: ${priceNum} РУБ.`);
                      } else {
                        console.log(`[ОТКАЗ СТИМА] Предмет: ${item}. Ответ Valve: ${data.trim().substring(0, 100)}`);
                      }
                    } catch(e) {
                      console.log(`[ОШИБКА ПАРСИНГА] Предмет: ${item}. Код сервера: ${res.statusCode}. Текст: ${data.trim().substring(0, 100)}`);
                    }
                    setTimeout(resolve, 14000);
                  });
                }).on("error", (err) => {
                  console.log(`[СЕТЕВАЯ ОШИБКА] ${item}: ${err.message}`);
                  setTimeout(resolve, 14000);
                });
              });
            }
            
            // Добавляем в файл техническую метку времени, чтобы точно видеть, что файл перезаписан
            result["last_updated_time_mark"] = new Date().toISOString();
            fs.writeFileSync("prices.json", JSON.stringify(result, null, 2));
          }
          
          fetchAll();
        '

    - name: Commit and push changes back to landing
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add prices.json
        git diff-index --quiet HEAD || git commit -m "Automated live market price sync from Steam in RUB"
        git push
